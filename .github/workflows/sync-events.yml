name: Sync evangelism events

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper (with retries)
        run: |
          for i in 1 2 3; do
            npm run scrape:events && break
            if [ "$i" -eq 3 ]; then
              echo "Scraper failed after 3 attempts"
              exit 1
            fi
            echo "Attempt $i failed; retrying in 20s..."
            sleep 20
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/events.json
          if git diff --staged --quiet; then
            echo "No changes to events.json"
          else
            git commit -m "chore: sync assets/events.json from behindthewalls.com"
            git push
          fi
