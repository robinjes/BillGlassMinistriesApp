name: Sync position opportunities

on:
  schedule:
    - cron: '20 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npm run scrape:positions

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/positions.json
          if git diff --staged --quiet; then
            echo "No changes to positions.json"
          else
            git commit -m "chore: sync assets/positions.json from behindthewalls.com"
            git push
          fi
